<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Authentification - EventsBenin</title>

  <!-- Bootstrap & FontAwesome -->
  <link rel="stylesheet" href="./bootstrap-5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="./fontawesome-free-6.7.2-web/fontawesome-free-6.7.2-web/css/all.min.css">
  <script src="./bootstrap-5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <style>
    body { background-color: #f8f9fa; }
    .card-auth { max-width: 500px; margin: 50px auto; padding: 30px; box-shadow: 0 0 15px rgba(0,0,0,0.1); }
  </style>
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container">
    <a class="navbar-brand fw-bold" href="index.html">EventsBenin</a>
    <div class="collapse navbar-collapse" id="menu">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link" href="index.html">Accueil</a></li>
        <li class="nav-item"><a class="nav-link" href="evenements.html">Événements</a></li>
        <li class="nav-item"><a class="nav-link" href="apropos.html">À propos</a></li>
        <li class="nav-item"><a class="nav-link" href="connexion.html">Connexion</a></li>
        <li class="nav-item">
          <a class="nav-link btn btn-primary text-white ms-2 px-3" href="inscription.html">Inscription</a>
        </li>
      </ul>
    </div>
  </div>
</nav>

<div class="card card-auth">
  <h4 class="mb-4 text-center">Connexion ou Inscription</h4>

  <ul class="nav nav-tabs mb-3" id="authTabs" role="tablist">
    <li class="nav-item" role="presentation">
      <button class="nav-link active" id="login-tab" data-bs-toggle="tab" data-bs-target="#login" type="button" role="tab">Connexion</button>
    </li>
    <li class="nav-item" role="presentation">
      <button class="nav-link" id="signup-tab" data-bs-toggle="tab" data-bs-target="#signup" type="button" role="tab">Inscription</button>
    </li>
  </ul>

  <div class="tab-content" id="authTabsContent">
    <!-- Connexion -->
    <div class="tab-pane fade show active" id="login" role="tabpanel">
      <form id="loginForm">
        <div class="mb-3">
          <label for="login-username" class="form-label">Nom d'utilisateur</label>
          <input type="text" class="form-control" id="login-username" required>
        </div>
        <div class="mb-3">
          <label for="login-password" class="form-label">Mot de passe</label>
          <input type="password" class="form-control" id="login-password" required>
        </div>
        <button type="submit" class="btn btn-primary w-100">Se connecter</button>
      </form>
    </div>

    <!-- Inscription -->
    <div class="tab-pane fade" id="signup" role="tabpanel">
      <form id="signupForm">
        <div class="mb-3">
          <label for="signup-username" class="form-label">Nom d'utilisateur</label>
          <input type="text" class="form-control" id="signup-username" required>
        </div>
        <div class="mb-3">
          <label for="signup-email" class="form-label">Email</label>
          <input type="email" class="form-control" id="signup-email" required>
        </div>
        <div class="mb-3">
          <label for="signup-password" class="form-label">Mot de passe</label>
          <input type="password" class="form-control" id="signup-password" required>
        </div>
        <div class="mb-3">
          <label for="signup-phone" class="form-label">Téléphone</label>
          <input type="tel" class="form-control" id="signup-phone" placeholder="Ex: 229XXXXXXX">
        </div>
        <button type="submit" class="btn btn-success w-100">S'inscrire</button>
      </form>
    </div>
  </div>
</div>

<script>
// Navbar dynamique (identique que dans details.html)
document.addEventListener("DOMContentLoaded", function(){
  const user = JSON.parse(localStorage.getItem("userConnected"));
  const nav = document.querySelector(".navbar-nav");

  if(user){
    nav.querySelectorAll(".nav-link").forEach(link => {
      if(link.textContent.trim() === "Connexion" || link.textContent.trim() === "Inscription"){
        link.parentElement.remove();
      }
    });
    const liProfil = document.createElement("li");
    liProfil.className = "nav-item";
    liProfil.innerHTML = `<a class="nav-link" href="#">Profil (${user.username})</a>`;
    nav.appendChild(liProfil);

    const liDeconnexion = document.createElement("li");
    liDeconnexion.className = "nav-item";
    liDeconnexion.innerHTML = `<a class="nav-link" href="#" id="logoutBtn">Déconnexion</a>`;
    nav.appendChild(liDeconnexion);

    document.getElementById("logoutBtn").addEventListener("click", function(){
      localStorage.removeItem("userConnected");
      location.reload();
    });
  }
});

// Gestion formulaire connexion
document.getElementById("loginForm").addEventListener("submit", function(e){
  e.preventDefault();
  const username = document.getElementById("login-username").value.trim();
  const password = document.getElementById("login-password").value.trim();
  const users = JSON.parse(localStorage.getItem("users")) || [];
  const user = users.find(u => u.username === username && u.password === password);
  if(!user){
    alert("⚠️ Nom d'utilisateur ou mot de passe incorrect !\nSi vous n'avez pas de compte, inscrivez-vous d'abord.");
    return;
  }
  localStorage.setItem("userConnected", JSON.stringify(user));
  alert("✅ Connexion réussie !");
  // Redirection vers details.html après connexion
  window.location.href = "details.html";
});

// Gestion formulaire inscription
document.getElementById("signupForm").addEventListener("submit", function(e){
  e.preventDefault();
  const username = document.getElementById("signup-username").value.trim();
  const email = document.getElementById("signup-email").value.trim();
  const password = document.getElementById("signup-password").value.trim();
  const phone = document.getElementById("signup-phone").value.trim();
  if(!username || !email || !password){
    alert("Veuillez remplir tous les champs obligatoires !");
    return;
  }

  let users = JSON.parse(localStorage.getItem("users")) || [];
  if(users.find(u => u.username === username)){
    alert("Nom d'utilisateur déjà pris !");
    return;
  }

  const newUser = { username, email, password, phone };
  users.push(newUser);
  localStorage.setItem("users", JSON.stringify(users));
  localStorage.setItem("userConnected", JSON.stringify(newUser));
  alert("✅ Inscription réussie !");
  window.location.href = "details.html"; // Redirection vers détails
});
</script>

</body>
</html>
