<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EventsBenin - Inscription</title>
  <link rel="stylesheet" href="./bootstrap-5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="./fontawesome-free-6.7.2-web/fontawesome-free-6.7.2-web/css/all.min.css">
  <style>
    body { background-color: #f8f9fa; }
    .auth-container { 
      max-width: 400px; 
      margin: 80px auto; 
      background: #fff; 
      padding: 30px; 
      border-radius: 10px; 
      box-shadow: 0 0 15px rgba(0,0,0,0.2); 
    }
    .btn-main { 
      background-color: #ff6600; 
      color: #fff; 
      border: none; 
      width: 100%; 
    }
    .btn-main:hover { background-color: #e65c00; }
  </style>
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container">
    <a class="navbar-brand fw-bold" href="index.html">EventsBenin</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menu">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="menu">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link" href="index.html">Accueil</a></li>
        <li class="nav-item"><a class="nav-link" href="evenements.html">Événements</a></li>
        <li class="nav-item"><a class="nav-link" href="#apropos">À propos</a></li>
        <li class="nav-item"><a class="nav-link active" href="inscription.html">Inscription</a></li>
        <li class="nav-item"><a class="nav-link" href="connexion.html">Connexion</a></li>
      </ul>
    </div>
  </div>
</nav>

<div class="auth-container">
  <h3 class="text-center mb-4">Inscription</h3>

  <!-- Formulaire statique -->
  <form action="connexion.html" method="get">
    <div class="mb-3">
      <label for="regUsername" class="form-label">Nom d'utilisateur</label>
      <input type="text" class="form-control" id="regUsername" name="username" required>
    </div>

    <div class="mb-3">
      <label for="regEmail" class="form-label">Email</label>
      <input type="email" class="form-control" id="regEmail" name="email" required>
    </div>

    <div class="mb-3">
      <label for="regPassword" class="form-label">Mot de passe</label>
      <input type="password" class="form-control" id="regPassword" name="password" required minlength="4">
    </div>

    <!-- Redirection vers connexion.html après "inscription" -->
    <button type="submit" class="btn btn-main mb-3">S'inscrire</button>

    <p class="text-center">
      Vous avez déjà un compte ? 
      <a href="connexion.html" class="text-warning">Connectez-vous</a>
    </p>
  </form>
</div>

<script src="./bootstrap-5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
